name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Verify Bun installation
        run: bun --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint:all

      - name: Start test server
        run: |
          bun run start > server.log 2>&1 &
          echo $! > server.pid
        env:
          PORT: 4000
          NODE_ENV: test
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          JWT_URI: http://127.0.0.1:4000/.well-known/jwks.json

      - name: Wait for test server
        run: |
          for i in {1..30}; do
            if curl --silent --fail http://127.0.0.1:4000/health; then
              echo "Server is ready"
              exit 0
            fi

            echo "Waiting for server..."
            sleep 1
          done

          echo "Server failed to start"
          cat server.log
          exit 1

      - name: Test Coverage
        run: bun test --coverage
        env:
          PORT: 4000
          NODE_ENV: test
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          JWT_URI: http://127.0.0.1:4000/.well-known/jwks.json

      - name: Print server logs on failure
        if: failure()
        run: cat server.log || true

      - name: Stop test server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi

      - name: Build
        run: bun run build

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-push-docker:
    name: Build and Push Docker
    needs: build-and-test
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      IMAGE_NAME: vrunsys/mernstack-test
      IMAGE_TAG: build-${{ github.run_number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            -f docker/prod/Dockerfile .

      - name: Push versioned Docker image
        run: docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Push latest Docker image
        run: docker push ${{ env.IMAGE_NAME }}:latest
